server.port=8080
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Auto-discover services from Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=asset-service
spring.cloud.gateway.routes[1].uri=lb://asset-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/assets/**

spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[3].id=report-service
spring.cloud.gateway.routes[3].uri=lb://report-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/reports/**

spring.cloud.gateway.routes[4].id=maintenance-service
spring.cloud.gateway.routes[4].uri=lb://maintenance-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/maintenance/**