server.port=8082
spring.application.name=asset-service
spring.config.import=optional:configserver:http://localhost:8888
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/asset_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT (must match auth-service)
jwt.secret=${JWT_SECRET:your_super_secret_key_that_should_be_at_least_256_bits_long_for_HS256_algorithm_in_production}

# CSV import limits
asset.csv.max-rows=10000

# Actuator
management.endpoints.web.exposure.include=health,info
